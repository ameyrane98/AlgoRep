<!DOCTYPE html>
<html>
<head>
  <title>PNG Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
    .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; }
    button { 
      display: block; width: 100%; margin: 10px 0; padding: 12px; 
      background: #3bc0f0; border: none; border-radius: 4px; 
      color: white; font-weight: bold; cursor: pointer; 
    }
    button:hover { background: #2ba0d0; }
  </style>
</head>
<body>
  <div class="card">
    <h3>Download Extension Icons</h3>
    <p>Click each button to download your PNG files.</p>
    
    <button onclick="downloadIcon(16)">Download 16x16 PNG</button>
    <button onclick="downloadIcon(48)">Download 48x48 PNG</button>
    <button onclick="downloadIcon(128)">Download 128x128 PNG</button>
  </div>
  
  <script>
    function downloadIcon(size) {
      // We inject the specific size directly into the SVG's width/height attributes here
      // so the canvas knows exactly how to scale it!
      const svgCode = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="${size}" height="${size}">
          <rect width="256" height="256" rx="56" fill="#1e2136"/>
          <path d="M 64 204 L 116 56 L 168 204" fill="none" stroke="#e1e3e6" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="192" cy="62" r="16" fill="#3bc0f0"/>
        </svg>
      `;

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      
      const svgBlob = new Blob([svgCode], {type: 'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(svgBlob);
      
      img.onload = function() {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
        
        const imgURI = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'algorep-icon-' + size + '.png';
        link.href = imgURI;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };
      
      img.src = url;
    }
  </script>
</body>
</html>
